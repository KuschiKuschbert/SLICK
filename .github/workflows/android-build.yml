name: SLICK Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Secret Scanner ───────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ─── Build + Lint + Test ─────────────────────────────────────────────────────
  build-and-test:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties from secrets
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          SUPABASE_URL=https://sqddpmhjpzgzggbsqgpr.supabase.co
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          OPEN_METEO_BASE_URL=https://api.open-meteo.com
          OPEN_METEO_API_KEY=
          VALHALLA_BASE_URL=https://valhalla1.openstreetmap.de
          PMTILES_URL=${{ secrets.PMTILES_URL }}
          MAP_STYLE_URL=${{ secrets.MAP_STYLE_URL }}
          P2P_SERVICE_ID=com.slick.tactical.mesh.v1
          SQLCIPHER_PASSPHRASE_ALIAS=slick_db_key_v1
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run unit tests (JUnit 5)
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: slick-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─── Release Build (main branch only) ───────────────────────────────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          SUPABASE_URL=https://sqddpmhjpzgzggbsqgpr.supabase.co
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          OPEN_METEO_BASE_URL=https://api.open-meteo.com
          OPEN_METEO_API_KEY=
          VALHALLA_BASE_URL=https://valhalla1.openstreetmap.de
          PMTILES_URL=${{ secrets.PMTILES_URL }}
          MAP_STYLE_URL=${{ secrets.MAP_STYLE_URL }}
          P2P_SERVICE_ID=com.slick.tactical.mesh.v1
          SQLCIPHER_PASSPHRASE_ALIAS=slick_db_key_v1
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: slick-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
